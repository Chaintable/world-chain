name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE_NAME: world-chain-writer
  DOCKERFILE: Dockerfile

jobs:
  build:
    name: build-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu2404-linux-x86-64-16c
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu2204-arm64-16c
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision
        run: echo "REVISION=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.REVISION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          provenance: false
          sbom: false

  manifest:
    name: merge-manifest
    needs: build
    runs-on: ubuntu2404-linux-x86-64-16c
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision
        run: echo "REVISION=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${REGISTRY}/${IMAGE_NAME}:${REVISION} \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-amd64 \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-arm64
